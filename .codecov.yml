# Codecov configuration for datafold project
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_not_found: success
        if_ci_failed: error
        
    patch:
      default:
        target: 80%
        threshold: 5%
        if_not_found: success
        if_ci_failed: error

    changes:
      default:
        if_not_found: success
        if_ci_failed: error

flags:
  frontend:
    paths:
      - src/datafold_node/static-react/src/
    carryforward: true
    
  rust:
    paths:
      - src/
    carryforward: true

ignore:
  - "src/datafold_node/static-react/src/test/**/*"
  - "src/datafold_node/static-react/src/**/*.test.*"
  - "src/datafold_node/static-react/src/**/*.spec.*"
  - "src/datafold_node/static-react/src/**/__tests__/**/*"
  - "src/datafold_node/static-react/src/**/__mocks__/**/*"
  - "src/datafold_node/static-react/src/assets/**/*"
  - "src/datafold_node/static-react/src/styles/**/*"
  - "src/datafold_node/static-react/*.config.*"
  - "tests/**/*"
  - "**/*.md"
  - ".github/**/*"
  - "scripts/**/*"

comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes
  branches:
    - main
    - develop

github_checks:
  annotations: true
name: Auto-Fix Failing Tests

on:
  workflow_run:
    workflows: ["Test Suite"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    name: Claude Auto-Fix
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_commit.author.name != 'Claude Code'
    runs-on: ubuntu-latest

    env:
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      FOLD_OPENROUTER_API_KEY: ${{ secrets.FOLD_OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout branch that failed
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "Claude Code"
          git config user.email "claude@anthropic.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install clippy
        run: rustup component add clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build frontend (required for rust_embed)
        run: |
          cd src/server/static-react
          npm ci
          npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude to fix tests
        continue-on-error: true
        timeout-minutes: 10
        run: |
          claude -p "The CI test suite just failed on this branch. Your job:

          1. Run cargo clippy --all-targets --workspace -- -D warnings to check for clippy failures
          2. Run cargo test --workspace --all-targets to find test failures
          3. Run 'cd src/server/static-react && npm ci && npm test' for frontend failures
          4. Read the error output carefully and fix the source code
          5. Re-run the failing command to verify your fix works

          Rules:
          - Fix the source code, not the tests (unless the test itself is wrong)
          - Do NOT add fallbacks or silent error handling
          - Keep fixes minimal and focused" \
            --max-turns 20 \
            --allowedTools "Bash,Read,Edit,Glob,Grep"

      - name: Push fix if changes were made
        if: always()
        run: |
          git checkout -- .github/workflows/ 2>/dev/null || true
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to push"
          else
            git add -A
            git reset HEAD .github/workflows/ 2>/dev/null || true
            git diff --cached --quiet || git commit -m "fix: auto-fix CI test failures

            Co-Authored-By: Claude Code <claude@anthropic.com>"
            git push origin ${{ github.event.workflow_run.head_branch }}
          fi

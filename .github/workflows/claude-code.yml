name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Get PR info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          PR_BRANCH=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName -q .headRefName)
          echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config user.name "Claude Code"
          git config user.email "claude@anthropic.com"

      - name: Get comment body
        id: comment
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            FILE="${{ github.event.comment.path }}"
            LINE="${{ github.event.comment.line }}"
            {
              echo "prompt<<PROMPT_DELIMITER"
              echo "Review comment on $FILE line $LINE:"
              cat <<'COMMENT_EOF'
          ${{ github.event.comment.body }}
          COMMENT_EOF
              echo "PROMPT_DELIMITER"
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            {
              echo "prompt<<PROMPT_DELIMITER"
              echo "PR review:"
              cat <<'COMMENT_EOF'
          ${{ github.event.review.body }}
          COMMENT_EOF
              echo "PROMPT_DELIMITER"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "prompt<<PROMPT_DELIMITER"
              cat <<'COMMENT_EOF'
          ${{ github.event.comment.body }}
          COMMENT_EOF
              echo "PROMPT_DELIMITER"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        run: |
          claude -p "${{ steps.comment.outputs.prompt }}" \
            --max-turns 20 \
            --allowedTools "Bash,Read,Edit,Glob,Grep"

      - name: Push changes
        if: always()
        run: |
          git checkout -- .github/workflows/ 2>/dev/null || true
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to push"
          else
            git add -A
            git reset HEAD .github/workflows/ 2>/dev/null || true
            git diff --cached --quiet || git commit -m "Address review comment

          Co-Authored-By: Claude Code <claude@anthropic.com>"
            git push origin ${{ steps.pr.outputs.branch }}
          fi

      - name: Comment on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet HEAD~1 2>/dev/null; then
            gh pr comment "${{ steps.pr.outputs.pr_number }}" --repo "${{ github.repository }}" --body "I reviewed the comment but no code changes were needed."
          else
            gh pr comment "${{ steps.pr.outputs.pr_number }}" --repo "${{ github.repository }}" --body "I've pushed a fix addressing the review comment."
          fi

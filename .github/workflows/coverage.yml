name: Code Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-coverage:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: src/datafold_node/static-react

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: src/datafold_node/static-react/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run tests with coverage
      run: npm run test:coverage:threshold

    - name: Check coverage thresholds
      run: npm run ci:coverage-check

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: src/datafold_node/static-react/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: true

    - name: Upload coverage reports to GitHub
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: frontend-coverage-report
        path: src/datafold_node/static-react/coverage/
        retention-days: 30

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: romeovs/lcov-reporter-action@v0.3.1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        lcov-file: src/datafold_node/static-react/coverage/lcov.info
        delete-old-comments: true

  rust-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Generate Rust coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info

    - name: Upload Rust coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: lcov.info
        flags: rust
        name: rust-coverage
        fail_ci_if_error: true

    - name: Upload Rust coverage reports to GitHub
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: rust-coverage-report
        path: target/llvm-cov/
        retention-days: 30

  combined-coverage:
    runs-on: ubuntu-latest
    needs: [frontend-coverage, rust-coverage]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download frontend coverage
      uses: actions/download-artifact@v3
      with:
        name: frontend-coverage-report
        path: frontend-coverage/

    - name: Download rust coverage
      uses: actions/download-artifact@v3
      with:
        name: rust-coverage-report
        path: rust-coverage/

    - name: Generate combined coverage badge
      run: |
        echo "🧪 **Coverage Report Summary**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Coverage |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|----------|" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend  | ![Frontend Coverage](https://img.shields.io/badge/coverage-check_reports-blue) |" >> $GITHUB_STEP_SUMMARY
        echo "| Rust      | ![Rust Coverage](https://img.shields.io/badge/coverage-check_reports-blue) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📁 **Artifacts:**" >> $GITHUB_STEP_SUMMARY
        echo "- Frontend coverage reports available in artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Rust coverage reports available in artifacts" >> $GITHUB_STEP_SUMMARY
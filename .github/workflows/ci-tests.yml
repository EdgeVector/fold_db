name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-redaction:
    name: Redaction Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - name: Run redaction lint
        run: sh scripts/lint-redaction.sh

  lint-structured-fields:
    name: Structured Fields Lint (warn-only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - name: Run structured-fields lint
        id: structured-fields
        run: |
          # The script always exits 0. Tee output to a file so we can
          # surface it as a job summary regardless of hit count.
          sh scripts/lint-structured-fields.sh | tee structured-fields-lint.log

      - name: Publish suggestions to job summary
        if: always()
        run: |
          {
            echo "## Structured fields lint (warn-only, educational)"
            echo
            echo "This lint never blocks a PR. It surfaces \`tracing\` call sites that"
            echo "use positional message args instead of structured fields, so reviewers"
            echo "can prefer the structured form on new code. See"
            echo "\`docs/observability/structured-fields-lint.md\`."
            echo
            echo '```'
            cat structured-fields-lint.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Lint tracing egress classifiers
        id: trace-egress
        continue-on-error: true
        run: bash scripts/lint-tracing-egress.sh --strict

      - name: Lint tokio::spawn instrumentation
        id: spawn-instrument
        continue-on-error: true
        run: bash scripts/lint-spawn-instrument.sh

      - name: Check formatting
        id: fmt
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Run clippy
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run cargo test
        id: cargo-test
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cargo test --workspace --all-targets

      - name: Rust test summary
        if: always()
        run: |
          for step_name in trace-egress spawn-instrument fmt clippy cargo-test; do
            case "$step_name" in
              trace-egress)     label="Trace Egress Lint" ;;
              spawn-instrument) label="Spawn Instrument Lint" ;;
              fmt)              label="Rust Format" ;;
              clippy)           label="Rust Clippy" ;;
              cargo-test)       label="Rust Tests" ;;
            esac
            case "$step_name" in
              trace-egress)     status="${{ steps.trace-egress.outcome }}" ;;
              spawn-instrument) status="${{ steps.spawn-instrument.outcome }}" ;;
              fmt)              status="${{ steps.fmt.outcome }}" ;;
              clippy)           status="${{ steps.clippy.outcome }}" ;;
              cargo-test)       status="${{ steps.cargo-test.outcome }}" ;;
            esac
            case "$status" in
              success) echo "✅ **$label** — passed" >> $GITHUB_STEP_SUMMARY ;;
              skipped) echo "⏭️ **$label** — skipped" >> $GITHUB_STEP_SUMMARY ;;
              *)       echo "❌ **$label** — failed" >> $GITHUB_STEP_SUMMARY ;;
            esac
          done

      - name: Fail if any check failed
        if: |
          steps.trace-egress.outcome == 'failure' ||
          steps.spawn-instrument.outcome == 'failure' ||
          steps.fmt.outcome == 'failure' ||
          steps.clippy.outcome == 'failure' ||
          steps.cargo-test.outcome == 'failure'
        run: exit 1

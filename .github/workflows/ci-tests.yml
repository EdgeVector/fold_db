name: Test Suite

on:
  push:
    branches: [mainline]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        id: clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check AWS backend compiles
        id: check-aws
        continue-on-error: true
        run: cargo check --workspace --features aws-backend

      - name: Run cargo test
        id: cargo-test
        continue-on-error: true
        run: cargo test --workspace --all-targets

      - name: Rust test summary
        if: always()
        run: |
          for step_name in clippy check-aws cargo-test; do
            case "$step_name" in
              clippy)         label="Rust Clippy" ;;
              check-aws)      label="AWS Backend Check" ;;
              cargo-test)     label="Rust Tests" ;;
            esac
            case "$step_name" in
              clippy)         status="${{ steps.clippy.outcome }}" ;;
              check-aws)      status="${{ steps.check-aws.outcome }}" ;;
              cargo-test)     status="${{ steps.cargo-test.outcome }}" ;;
            esac
            case "$status" in
              success) echo "✅ **$label** — passed" >> $GITHUB_STEP_SUMMARY ;;
              skipped) echo "⏭️ **$label** — skipped" >> $GITHUB_STEP_SUMMARY ;;
              *)       echo "❌ **$label** — failed" >> $GITHUB_STEP_SUMMARY ;;
            esac
          done

      - name: Fail if clippy or tests failed
        if: |
          steps.clippy.outcome == 'failure' ||
          steps.check-aws.outcome == 'failure' ||
          steps.cargo-test.outcome == 'failure'
        run: exit 1


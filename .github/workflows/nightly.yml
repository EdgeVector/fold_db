name: Nightly Binaries

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at midnight PST / 8:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  # Skip if no commits in the last 24 hours (unless manually triggered)
  check-changes:
    name: Check for Recent Changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: mainline
          fetch-depth: 0

      - name: Check for commits in last 24 hours
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — building regardless"
          else
            RECENT=$(git log --since="24 hours ago" --oneline | head -1)
            if [ -n "$RECENT" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Found recent commits — building"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "No recent commits — skipping build"
            fi
          fi

  # Build CLI binaries (server + CLI tool)
  build-cli:
    name: Build CLI Binary
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - os: macos-15-large
            target: x86_64-apple-darwin
            artifact_name: folddb_server-macos-x86_64
            binary: folddb_server
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: folddb_server-macos-aarch64
            binary: folddb_server
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: folddb_server-linux-x86_64
            binary: folddb_server
          - os: macos-15-large
            target: x86_64-apple-darwin
            artifact_name: folddb-macos-x86_64
            binary: folddb
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: folddb-macos-aarch64
            binary: folddb
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: folddb-linux-x86_64
            binary: folddb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: mainline

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: src/server/static-react/node_modules
          key: ${{ matrix.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Build frontend (required by RustEmbed)
        working-directory: src/server/static-react
        run: npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/${{ matrix.artifact_name }}

      - name: Upload binary to nightly release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          tag: nightly
          overwrite: true
          prerelease: true

  # Update nightly release notes after all builds complete
  update-release-notes:
    name: Update Nightly Release Notes
    needs: build-cli
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: mainline

      - name: Get build metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Force-update nightly tag
        run: |
          git tag -f nightly
          git push origin nightly --force

      - name: Update nightly release body
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: README.md
          asset_name: README.md
          tag: nightly
          overwrite: true
          prerelease: true
          body: |
            ## Nightly Build

            **Date:** ${{ steps.meta.outputs.build_date }}
            **Commit:** [`${{ steps.meta.outputs.short_sha }}`](https://github.com/shiba4life/fold_db/commit/${{ steps.meta.outputs.short_sha }})
            **Branch:** `mainline`

            > **Warning:** Nightly builds are automatically generated from the latest `mainline` commit and may be unstable.

            ---

            ### HTTP Server Binaries

            | Platform | Download |
            |----------|----------|
            | macOS (Intel) | [folddb_server-macos-x86_64](https://github.com/shiba4life/fold_db/releases/download/nightly/folddb_server-macos-x86_64) |
            | macOS (Apple Silicon) | [folddb_server-macos-aarch64](https://github.com/shiba4life/fold_db/releases/download/nightly/folddb_server-macos-aarch64) |
            | Linux (x86_64) | [folddb_server-linux-x86_64](https://github.com/shiba4life/fold_db/releases/download/nightly/folddb_server-linux-x86_64) |

            ### CLI Tool Binaries

            | Platform | Download |
            |----------|----------|
            | macOS (Intel) | [folddb-macos-x86_64](https://github.com/shiba4life/fold_db/releases/download/nightly/folddb-macos-x86_64) |
            | macOS (Apple Silicon) | [folddb-macos-aarch64](https://github.com/shiba4life/fold_db/releases/download/nightly/folddb-macos-aarch64) |
            | Linux (x86_64) | [folddb-linux-x86_64](https://github.com/shiba4life/fold_db/releases/download/nightly/folddb-linux-x86_64) |

            ---

            ### Usage

            ```bash
            # Download and make executable
            chmod +x folddb-*
            sudo mv folddb-* /usr/local/bin/folddb

            # Or use the HTTP server
            chmod +x folddb_server-*
            ./folddb_server-* --port 9001
            ```

            ---

            For stable releases, see the [latest release](https://github.com/shiba4life/fold_db/releases/latest).

name: Release Binaries and Native Apps

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.5, v1.0.0, etc.

permissions:
  contents: write  # Required for creating releases

jobs:
  # Build CLI binaries (server + CLI tool)
  build-cli:
    name: Build CLI Binary
    strategy:
      matrix:
        include:
          - os: macos-15-large  # Intel runner
            target: x86_64-apple-darwin
            artifact_name: datafold_http_server-macos-x86_64
            binary: datafold_http_server
          - os: macos-latest  # Apple Silicon (ARM64)
            target: aarch64-apple-darwin
            artifact_name: datafold_http_server-macos-aarch64
            binary: datafold_http_server
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: datafold_http_server-linux-x86_64
            binary: datafold_http_server
          - os: macos-15-large  # Intel runner
            target: x86_64-apple-darwin
            artifact_name: folddb-macos-x86_64
            binary: folddb
          - os: macos-latest  # Apple Silicon (ARM64)
            target: aarch64-apple-darwin
            artifact_name: folddb-macos-aarch64
            binary: folddb
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: folddb-linux-x86_64
            binary: folddb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ matrix.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}
          asset_name: ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}
          tag: ${{ github.ref }}
          overwrite: true

  # Build native macOS apps
  build-macos-app:
    name: Build macOS Native App
    strategy:
      matrix:
        include:
          - os: macos-latest  # Apple Silicon (ARM64)
            arch: aarch64
          - os: macos-15-large  # Intel
            arch: x86_64

    runs-on: ${{ matrix.os }}

    env:
      OPENAPI_URL: ${{ github.workspace }}/src/datafold_node/static-react/target/openapi.json
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: src/datafold_node/static-react/node_modules
          key: ${{ matrix.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: src/datafold_node/static-react
        run: npm ci

      - name: Build frontend
        working-directory: src/datafold_node/static-react
        run: npm run build

      - name: Build Tauri app
        working-directory: src/datafold_node/static-react
        run: npm run tauri:build

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Show bundle outputs
        shell: bash
        run: |
          echo "Bundle path: src/datafold_node/static-react/src-tauri/target/release/bundle"
          ls -al src/datafold_node/static-react/src-tauri/target/release/bundle || true
          echo "dmg dir:"
          ls -al src/datafold_node/static-react/src-tauri/target/release/bundle/dmg || true
          echo "macos dir:"
          ls -al src/datafold_node/static-react/src-tauri/target/release/bundle/macos || true

      - name: Rename and prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cd src/datafold_node/static-react/src-tauri/target/release/bundle
          
          # Copy DMG (if produced)
          for f in dmg/DataFold_*.dmg; do
            if [ -f "$f" ]; then
              echo "Found DMG: $f"
              cp "$f" "$GITHUB_WORKSPACE/dist/DataFold-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg"
            else
              echo "No DMG found matching dmg/DataFold_*.dmg"
            fi
          done
          
          # Zip the .app (if produced)
          if [ -d macos/DataFold.app ]; then
            echo "Found .app; creating zip"
            cd macos
            zip -r "$GITHUB_WORKSPACE/dist/DataFold-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.app.zip" DataFold.app
          else
            echo "No macOS .app found at macos/DataFold.app"
          fi

      - name: Upload DMG to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/DataFold-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg
          asset_name: DataFold-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload APP.ZIP to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/DataFold-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.app.zip
          asset_name: DataFold-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.app.zip
          tag: ${{ github.ref }}
          overwrite: true

  # Create release notes
  create-release-notes:
    name: Create Release Notes
    needs: [build-cli, build-macos-app]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release notes
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: README.md  # Dummy file, just to update the body
          asset_name: README.md
          tag: ${{ github.ref }}
          overwrite: true
          body: |
            ## DataFold ${{ github.ref_name }}
            
            ### 🎉 Native macOS App (Recommended)
            
            **Download the native app for macOS:**
            - **Apple Silicon (M1/M2/M3)**: [DataFold-${{ steps.get_version.outputs.version }}-aarch64.dmg](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/DataFold-${{ steps.get_version.outputs.version }}-aarch64.dmg)
            - **Intel Mac**: [DataFold-${{ steps.get_version.outputs.version }}-x86_64.dmg](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/DataFold-${{ steps.get_version.outputs.version }}-x86_64.dmg)
            
            **Installation:**
            1. Download the `.dmg` file for your Mac
            2. Open the `.dmg` file
            3. Drag `DataFold.app` to your Applications folder
            4. Launch DataFold from Applications
            
            **Features:**
            - ✅ Native macOS application
            - ✅ Double-click to launch
            - ✅ Embedded server (no separate process needed)
            - ✅ Data stored in `~/.datafold/data`
            - ✅ Same UI as web version
            
            ---
            
            ### 🖥️ HTTP Server Binaries

            For running DataFold as a web server:
            - **macOS (Intel)**: [datafold_http_server-macos-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/datafold_http_server-macos-x86_64-${{ steps.get_version.outputs.version }})
            - **macOS (Apple Silicon)**: [datafold_http_server-macos-aarch64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/datafold_http_server-macos-aarch64-${{ steps.get_version.outputs.version }})
            - **Linux**: [datafold_http_server-linux-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/datafold_http_server-linux-x86_64-${{ steps.get_version.outputs.version }})

            **Installation:**
            ```bash
            # Download the binary for your platform
            chmod +x datafold_http_server-*

            # Move to your PATH (optional)
            sudo mv datafold_http_server-* /usr/local/bin/datafold_http_server
            ```

            **Usage:**
            ```bash
            # Start the HTTP server
            datafold_http_server --port 9001

            # Visit http://localhost:9001 for the web interface
            ```

            ---

            ### ⌨️ CLI Tool Downloads

            The `folddb` provides full control from your terminal:
            - **macOS (Intel)**: [folddb-macos-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb-macos-x86_64-${{ steps.get_version.outputs.version }})
            - **macOS (Apple Silicon)**: [folddb-macos-aarch64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb-macos-aarch64-${{ steps.get_version.outputs.version }})
            - **Linux**: [folddb-linux-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb-linux-x86_64-${{ steps.get_version.outputs.version }})

            **Installation:**
            ```bash
            chmod +x folddb-*
            sudo mv folddb-* /usr/local/bin/folddb
            ```

            **Usage:**
            ```bash
            folddb status -p
            folddb ingest data.json
            folddb llm-query "Show me recent purchases over $50"
            ```
            
            ---
            
            ### 📚 Documentation
            
            - [Quick Start Guide](https://github.com/shiba4life/fold_db/blob/mainline/QUICK_START.md)
            - [Native App Guide](https://github.com/shiba4life/fold_db/blob/mainline/TAURI_NATIVE_APP.md)
            - [Full Documentation](https://github.com/shiba4life/fold_db/blob/mainline/README.md)
            - [Changelog](https://github.com/shiba4life/fold_db/blob/mainline/CHANGELOG.md)
            
            ---
            
            **First time using the native app?** On first launch, macOS may show a security warning. Go to **System Preferences → Security & Privacy** and click "Open Anyway".

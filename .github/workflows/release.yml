name: Release Binaries and Native Apps

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.1.5, v1.0.0, etc.

permissions:
  contents: write  # Required for creating releases

jobs:
  # Build CLI binaries (server + CLI tool)
  build-cli:
    name: Build CLI Binary
    strategy:
      matrix:
        include:
          - os: macos-15-large  # Intel runner
            target: x86_64-apple-darwin
            artifact_name: folddb_server-macos-x86_64
            binary: folddb_server
          - os: macos-latest  # Apple Silicon (ARM64)
            target: aarch64-apple-darwin
            artifact_name: folddb_server-macos-aarch64
            binary: folddb_server
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: folddb_server-linux-x86_64
            binary: folddb_server
          - os: macos-15-large  # Intel runner
            target: x86_64-apple-darwin
            artifact_name: folddb-macos-x86_64
            binary: folddb
          - os: macos-latest  # Apple Silicon (ARM64)
            target: aarch64-apple-darwin
            artifact_name: folddb-macos-aarch64
            binary: folddb
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: folddb-linux-x86_64
            binary: folddb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ matrix.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: src/server/static-react/node_modules
          key: ${{ matrix.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Build frontend (required by RustEmbed)
        working-directory: src/server/static-react
        run: npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}

      - name: Upload binary to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}
          asset_name: ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}
          tag: ${{ github.ref }}
          overwrite: true

      - name: Create tarball
        shell: bash
        run: |
          cd dist
          tar czf ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.tar.gz \
            ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}

      - name: Upload tarball to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.tar.gz
          asset_name: ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.version }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true

  # Update Homebrew formula with new version and SHA256 hashes
  update-homebrew:
    name: Update Homebrew Formula
    needs: [build-cli]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download tarballs and compute SHA256
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          BASE="https://github.com/shiba4life/fold_db/releases/download/v${VERSION}"
          for name in folddb-macos-aarch64 folddb-macos-x86_64 folddb-linux-x86_64 \
                       folddb_server-macos-aarch64 folddb_server-macos-x86_64 folddb_server-linux-x86_64; do
            curl -sL "${BASE}/${name}-${VERSION}.tar.gz" -o "${name}.tar.gz"
            sha=$(sha256sum "${name}.tar.gz" | cut -d' ' -f1)
            # Convert hyphens to underscores for valid bash variable names
            env_name=$(echo "${name}" | tr '-' '_')
            echo "${env_name}_SHA=${sha}" >> $GITHUB_ENV
          done

      - name: Update formula version and SHA256 values
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          FORMULA=HomebrewFormula/folddb.rb

          # Update version
          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$FORMULA"

          # Helper: replace the sha256 on the line following a url containing $1
          update_sha() {
            local url_pattern="$1"
            local new_sha="$2"
            # Find line number of the url, then replace sha256 on the next line
            local line
            line=$(grep -n "$url_pattern" "$FORMULA" | head -1 | cut -d: -f1)
            if [ -n "$line" ]; then
              local sha_line=$((line + 1))
              sed -i "${sha_line}s/sha256 \".*\"/sha256 \"${new_sha}\"/" "$FORMULA"
            fi
          }

          update_sha "folddb-macos-aarch64-#{version}.tar.gz" "$folddb_macos_aarch64_SHA"
          update_sha "folddb-macos-x86_64-#{version}.tar.gz"  "$folddb_macos_x86_64_SHA"
          update_sha "folddb-linux-x86_64-#{version}.tar.gz"  "$folddb_linux_x86_64_SHA"
          update_sha "folddb_server-macos-aarch64-#{version}.tar.gz" "$folddb_server_macos_aarch64_SHA"
          update_sha "folddb_server-macos-x86_64-#{version}.tar.gz"  "$folddb_server_macos_x86_64_SHA"
          update_sha "folddb_server-linux-x86_64-#{version}.tar.gz"  "$folddb_server_linux_x86_64_SHA"

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/folddb.rb
          git diff --cached --quiet || git commit -m "brew: update folddb to ${{ steps.get_version.outputs.version }}"
          git push

  # Build native macOS apps
  build-macos-app:
    name: Build macOS Native App
    strategy:
      matrix:
        include:
          - os: macos-latest  # Apple Silicon (ARM64)
            arch: aarch64
          - os: macos-15-large  # Intel
            arch: x86_64

    runs-on: ${{ matrix.os }}

    env:
      OPENAPI_URL: ${{ github.workspace }}/src/server/static-react/target/openapi.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ matrix.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: src/server/static-react/node_modules
          key: ${{ matrix.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: src/server/static-react
        run: npm ci

      - name: Build frontend
        working-directory: src/server/static-react
        run: npm run build

      - name: Build Tauri app
        working-directory: src/server/static-react
        run: npm run tauri:build

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Show bundle outputs
        shell: bash
        run: |
          echo "Bundle path: src/server/static-react/src-tauri/target/release/bundle"
          ls -al src/server/static-react/src-tauri/target/release/bundle || true
          echo "dmg dir:"
          ls -al src/server/static-react/src-tauri/target/release/bundle/dmg || true
          echo "macos dir:"
          ls -al src/server/static-react/src-tauri/target/release/bundle/macos || true

      - name: Rename and prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cd src/server/static-react/src-tauri/target/release/bundle

          # Copy DMG (if produced)
          for f in dmg/FoldDB_*.dmg; do
            if [ -f "$f" ]; then
              echo "Found DMG: $f"
              cp "$f" "$GITHUB_WORKSPACE/dist/FoldDB-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg"
            else
              echo "No DMG found matching dmg/FoldDB_*.dmg"
            fi
          done

          # Zip the .app (if produced)
          if [ -d macos/FoldDB.app ]; then
            echo "Found .app; creating zip"
            cd macos
            zip -r "$GITHUB_WORKSPACE/dist/FoldDB-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.app.zip" FoldDB.app
          else
            echo "No macOS .app found at macos/FoldDB.app"
          fi

      - name: Upload DMG to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/FoldDB-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg
          asset_name: FoldDB-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.dmg
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload APP.ZIP to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/FoldDB-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.app.zip
          asset_name: FoldDB-${{ steps.get_version.outputs.version }}-${{ matrix.arch }}.app.zip
          tag: ${{ github.ref }}
          overwrite: true

  # Create release notes
  create-release-notes:
    name: Create Release Notes
    needs: [build-cli, build-macos-app, update-homebrew]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release notes
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: README.md  # Dummy file, just to update the body
          asset_name: README.md
          tag: ${{ github.ref }}
          overwrite: true
          body: |
            ## FoldDB ${{ github.ref_name }}

            ### Install via Homebrew

            ```bash
            brew tap shiba4life/fold_db
            brew install folddb
            ```

            This installs both `folddb` (CLI) and `folddb_server` (HTTP server with embedded UI).

            ---

            ### Native macOS App (Recommended)

            **Download the native app for macOS:**
            - **Apple Silicon (M1/M2/M3)**: [FoldDB-${{ steps.get_version.outputs.version }}-aarch64.dmg](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/FoldDB-${{ steps.get_version.outputs.version }}-aarch64.dmg)
            - **Intel Mac**: [FoldDB-${{ steps.get_version.outputs.version }}-x86_64.dmg](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/FoldDB-${{ steps.get_version.outputs.version }}-x86_64.dmg)

            **Installation:**
            1. Download the `.dmg` file for your Mac
            2. Open the `.dmg` file
            3. Drag `FoldDB.app` to your Applications folder
            4. Launch FoldDB from Applications

            **Features:**
            - Native macOS application
            - Double-click to launch
            - Embedded server (no separate process needed)
            - Data stored in `~/.folddb/data`
            - Same UI as web version

            ---

            ### HTTP Server Binaries

            For running FoldDB as a web server:
            - **macOS (Intel)**: [folddb_server-macos-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb_server-macos-x86_64-${{ steps.get_version.outputs.version }})
            - **macOS (Apple Silicon)**: [folddb_server-macos-aarch64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb_server-macos-aarch64-${{ steps.get_version.outputs.version }})
            - **Linux**: [folddb_server-linux-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb_server-linux-x86_64-${{ steps.get_version.outputs.version }})

            **Installation:**
            ```bash
            # Download the binary for your platform
            chmod +x folddb_server-*

            # Move to your PATH (optional)
            sudo mv folddb_server-* /usr/local/bin/folddb_server
            ```

            **Usage:**
            ```bash
            # Start the HTTP server
            folddb_server --port 9001

            # Visit http://localhost:9001 for the web interface
            ```

            ---

            ### CLI Tool Downloads

            The `folddb` CLI provides full control from your terminal:
            - **macOS (Intel)**: [folddb-macos-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb-macos-x86_64-${{ steps.get_version.outputs.version }})
            - **macOS (Apple Silicon)**: [folddb-macos-aarch64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb-macos-aarch64-${{ steps.get_version.outputs.version }})
            - **Linux**: [folddb-linux-x86_64-${{ steps.get_version.outputs.version }}](https://github.com/shiba4life/fold_db/releases/download/${{ github.ref_name }}/folddb-linux-x86_64-${{ steps.get_version.outputs.version }})

            **Installation:**
            ```bash
            chmod +x folddb-*
            sudo mv folddb-* /usr/local/bin/folddb
            ```

            **Usage:**
            ```bash
            folddb status -p
            folddb ingest data.json
            folddb llm-query "Show me recent purchases over $50"
            ```

            ---

            ### Documentation

            - [Quick Start Guide](https://github.com/shiba4life/fold_db/blob/mainline/QUICK_START.md)
            - [Native App Guide](https://github.com/shiba4life/fold_db/blob/mainline/TAURI_NATIVE_APP.md)
            - [Full Documentation](https://github.com/shiba4life/fold_db/blob/mainline/README.md)
            - [Changelog](https://github.com/shiba4life/fold_db/blob/mainline/CHANGELOG.md)

            ---

            **First time using the native app?** On first launch, macOS may show a security warning. Go to **System Preferences > Security & Privacy** and click "Open Anyway".

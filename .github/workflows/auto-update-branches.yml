name: Auto-update PR branches

on:
  push:
    branches: [mainline]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update all open PR branches
        run: |
          prs=$(gh pr list --base mainline --state open --json number,headRefName --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "No open PRs to update."
            exit 0
          fi
          for pr in $prs; do
            echo "Updating PR #$pr..."
            gh api repos/${{ github.repository }}/pulls/$pr/update-branch \
              -X PUT \
              2>&1 && echo "  Updated." || echo "  Skipped (already up to date or conflict)"
          done
        env:
          GH_TOKEN: ${{ github.token }}
